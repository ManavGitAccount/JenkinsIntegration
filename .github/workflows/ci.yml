name: CI

# When to run: every push to main and every pull request targeting main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # lets you trigger it manually from the Actions tab

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull your repo code onto the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Java 17 (matches maven.compiler.source/target in pom.xml)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'   # caches ~/.m2 so later runs are much faster

      # 3. Equivalent of your Jenkinsfile "Build & Test" stage
      #    (Linux runner, so 'mvn' instead of 'bat mvn')
      - name: Build & run tests
        run: mvn clean test

      # 4. Upload the Surefire test reports so you can inspect them
      #    even when tests fail (if: always() keeps this step running on failure)
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

  package:
    # Equivalent of your Jenkinsfile "Package" stage.
    # Only runs if build-and-test succeeded, and only on pushes to main
    # (no need to build jars for every PR).
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Package jar (skip tests, already ran)
        run: mvn package -DskipTests

      # Equivalent of archiveArtifacts 'target/*.jar' in your Jenkinsfile
      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: JenkinsIntegration-jar
          path: target/*.jar