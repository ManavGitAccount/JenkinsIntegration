name: CI

# When to run: every push to main and every pull request targeting main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # lets you trigger it manually from the Actions tab

jobs:
  build-and-test:
    strategy:
      fail-fast: false   # one failing combo won't cancel the others
      matrix:
        os: [ubuntu-latest, windows-latest]
        java: [17, 21]

    runs-on: ${{ matrix.os }}
    name: Test on ${{ matrix.os }} / JDK ${{ matrix.java }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'maven'

      - name: Build & run tests
        run: mvn clean test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ matrix.os }}-jdk${{ matrix.java }}
          path: target/surefire-reports/

  package:
    # Equivalent of your Jenkinsfile "Package" stage.
    # Only runs if build-and-test succeeded, and only on pushes to main
    # (no need to build jars for every PR).
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Package jar (skip tests, already ran)
        run: mvn package -DskipTests

      # Equivalent of archiveArtifacts 'target/*.jar' in your Jenkinsfile
      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: JenkinsIntegration-jar
          path: target/*.jar

  deploy-staging:
    needs: package
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Download jar from package job
        uses: actions/download-artifact@v4
        with:
          name: JenkinsIntegration-jar

      - name: Deploy to staging (simulated)
        run: |
          echo "Deploying to staging... (simulated)"
          echo "Deployed build #${{ github.run_number }} to staging."
          ls -l *.jar